[[rules]]
name = "bearer_token"
pattern = "Bearer [A-Za-z0-9\\-._~+/]+=*"
replacement = "Bearer [REDACTED]"

[[rules]]
name = "api_key"
pattern = "sk-[A-Za-z0-9]{20,}"
replacement = "sk-[REDACTED]"

[[rules]]
name = "bundle_id"
pattern = "com\\.omnio\\.[a-zA-Z0-9.]+"
replacement = "[BUNDLE_ID_REDACTED]"

[[rules]]
name = "product_id"
pattern = "(PRODUCT_ID|productId|product_id)\\s*[=:]\\s*['\"]?[a-zA-Z0-9._-]+"
replacement = "\\1=[PRODUCT_ID_REDACTED]"
